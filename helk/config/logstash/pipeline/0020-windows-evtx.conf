# Windows Security / EVTX lab (JSON pré-parsé — pas de lecture fichier live)
filter {
  if [source_type] == "windows-security" or [lab][source] == "windows-security" {
    mutate {
      add_tag => ["windows", "winevent", "security"]
      add_field => {
        "[event][module]" => "windows"
        "[event][dataset]" => "windows.security"
        "[event][category]" => "authentication"
        "[ecs][version]" => "1.12.0"
      }
    }
    if [EventID] { mutate { rename => { "EventID" => "[event][code]" } } }
    if [Hostname] and ![host][name] { mutate { rename => { "Hostname" => "[host][name]" } } }
    if [AccountName] { mutate { rename => { "AccountName" => "[user][name]" } } }
    if [IpAddress] { mutate { rename => { "IpAddress" => "[source][ip]" } } }
    if [CommandLine] {
      mutate {
        rename => { "CommandLine" => "[process][command_line]" }
        add_field => { "message" => "%{[process][command_line]}" }
      }
    }
    if [event][code] == 4625 {
      mutate { add_field => { "[threat][technique][id]" => "T1110" } }
    }
    mutate { add_field => { "[@metadata][helk_index]" => "helk-windows" } }
  }
}
