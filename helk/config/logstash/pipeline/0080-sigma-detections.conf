# Marquage événements candidats détection Sigma (exécution réelle via sigma_runner.py)
filter {
  if "sigma-candidate" in [tags] {
    mutate {
      add_field => {
        "[event][kind]" => "alert"
        "[rule][engine]" => "sigma-runner"
        "[rule][description]" => "Event matched Sigma candidate pattern in lab pipeline"
      }
    }
  }
}
