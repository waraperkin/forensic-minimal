# Linux syslog général
filter {
  if [source_type] == "linux-syslog" or [lab][source] == "linux-syslog" {
    mutate {
      add_tag => ["linux", "syslog"]
      add_field => {
        "[event][module]" => "linux"
        "[event][dataset]" => "linux.syslog"
        "[event][category]" => "host"
        "[ecs][version]" => "1.12.0"
      }
    }
    grok {
      match => {
        "message" => [
          "%{SYSLOGTIMESTAMP:syslog_ts} %{IPORHOST:host.name} %{PROG:[process][name]}\[%{POSINT:[process][pid]}\]: %{GREEDYDATA:syslog_msg}",
          "%{SYSLOGTIMESTAMP:syslog_ts} %{IPORHOST:host.name} %{PROG:[process][name]}: %{GREEDYDATA:syslog_msg}"
        ]
      }
      tag_on_failure => ["_groksyslog_parse_failure"]
    }
    if [message] =~ /(?i)malware|evil\.test|c2/ {
      mutate { add_tag => ["sigma-candidate", "network-suspicious"] add_field => { "[threat][technique][id]" => "T1071.004" } }
    }
    mutate { add_field => { "[@metadata][helk_index]" => "helk-linux" } }
  }
}
