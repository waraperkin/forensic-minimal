# Enrichissement MITRE ATT&CK (lookup CSV upstream + techniques inline)
filter {
  if [threat][technique][id] {
    mutate { add_field => { "[threat][framework]" => "MITRE ATT&CK" } }
    if [threat][technique][id] == "T1059" or [threat][technique][id] == "T1059.001" {
      mutate {
        add_field => {
          "[threat][technique][name]" => "Command and Scripting Interpreter"
          "[threat][tactic][id]" => "TA0002"
          "[threat][tactic][name]" => "Execution"
          "[threat][severity]" => "medium"
        }
      }
    } else if [threat][technique][id] =~ /^T1003/ {
      mutate {
        add_field => {
          "[threat][technique][name]" => "OS Credential Dumping"
          "[threat][tactic][id]" => "TA0006"
          "[threat][tactic][name]" => "Credential Access"
          "[threat][severity]" => "high"
        }
      }
    } else if [threat][technique][id] =~ /^T1110/ {
      mutate {
        add_field => {
          "[threat][technique][name]" => "Brute Force"
          "[threat][tactic][id]" => "TA0006"
          "[threat][tactic][name]" => "Credential Access"
          "[threat][severity]" => "medium"
        }
      }
    } else if [threat][technique][id] =~ /^T1071/ {
      mutate {
        add_field => {
          "[threat][technique][name]" => "Application Layer Protocol"
          "[threat][tactic][id]" => "TA0011"
          "[threat][tactic][name]" => "Command and Control"
          "[threat][severity]" => "medium"
        }
      }
    } else if [threat][technique][id] =~ /^T1548/ {
      mutate {
        add_field => {
          "[threat][technique][name]" => "Abuse Elevation Control Mechanism"
          "[threat][tactic][id]" => "TA0004"
          "[threat][tactic][name]" => "Privilege Escalation"
          "[threat][severity]" => "medium"
        }
      }
    } else if [threat][technique][id] =~ /^T1571/ {
      mutate {
        add_field => {
          "[threat][technique][name]" => "Non-Standard Port"
          "[threat][tactic][id]" => "TA0011"
          "[threat][tactic][name]" => "Command and Control"
          "[threat][severity]" => "high"
        }
      }
    }
  }
  if "sigma-candidate" in [tags] {
    mutate { add_field => { "[rule][category]" => "sigma-candidate" } }
  }
}
