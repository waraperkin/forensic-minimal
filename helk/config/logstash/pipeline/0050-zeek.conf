# Zeek conn (JSON lab — pas de Kafka live)
filter {
  if [source_type] == "zeek" or [lab][source] == "zeek" {
    mutate {
      add_tag => ["zeek", "network"]
      add_field => {
        "[event][module]" => "zeek"
        "[event][dataset]" => "zeek.conn"
        "[event][category]" => "network"
        "[ecs][version]" => "1.12.0"
      }
    }
    if [ts] { mutate { rename => { "ts" => "@timestamp" } } }
    if [id.orig_h] { mutate { rename => { "id.orig_h" => "[source][ip]" } } }
    if [id.orig_p] { mutate { rename => { "id.orig_p" => "[source][port]" } } }
    if [id.resp_h] { mutate { rename => { "id.resp_h" => "[destination][ip]" } } }
    if [id.resp_p] { mutate { rename => { "id.resp_p" => "[destination][port]" } } }
    if [proto] { mutate { rename => { "proto" => "[network][transport]" } } }
    if [service] { mutate { rename => { "service" => "[network][protocol]" } } }
    mutate {
      add_field => {
        "message" => "zeek conn %{[source][ip]}:%{[source][port]} -> %{[destination][ip]}:%{[destination][port]}"
      }
    }
    if [destination][port] == 4444 {
      mutate { add_tag => ["sigma-candidate"] add_field => { "[threat][technique][id]" => "T1571" } }
    }
    mutate { add_field => { "[@metadata][helk_index]" => "helk-zeek" } }
  }
}
