# Normalisation ECS commune (tous événements lab)
filter {
  if ![@timestamp] {
    mutate { add_field => { "@timestamp" => "%{+YYYY-MM-dd'T'HH:mm:ss.SSS'Z'}" } }
  }
  if ![host][name] and [host] and ![host][name] {
    mutate { rename => { "host" => "[host][name]" } }
  }
  if ![event][kind] {
    mutate { add_field => { "[event][kind]" => "event" } }
  }
  if ![event][type] {
    mutate { add_field => { "[event][type]" => "info" } }
  }
  if ![agent][type] {
    mutate { add_field => { "[agent][type]" => "helk-lab-simulator" } }
  }
  if ![data_stream][namespace] {
    mutate { add_field => { "[data_stream][namespace]" => "helk" } }
  }
  # Index par défaut si non routé
  if ![@metadata][helk_index] {
    mutate { add_field => { "[@metadata][helk_index]" => "helk-logs" } }
  }
}
