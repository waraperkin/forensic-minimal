# Sysmon — parsing + ECS (lab JSON / source_type=sysmon)
filter {
  if [source_type] == "sysmon" or [lab][source] == "sysmon" or [event][dataset] == "windows.sysmon" {
    mutate {
      add_tag => ["sysmon", "windows"]
      add_field => {
        "[event][module]" => "sysmon"
        "[event][dataset]" => "windows.sysmon"
        "[event][category]" => "process"
        "[ecs][version]" => "1.12.0"
      }
    }
    if [EventID] {
      mutate { rename => { "EventID" => "[event][code]" } }
    }
    if [Hostname] and ![host][name] {
      mutate { rename => { "Hostname" => "[host][name]" } }
    }
    if [CommandLine] {
      mutate {
        rename => { "CommandLine" => "[process][command_line]" }
        add_field => { "message" => "%{[process][command_line]}" }
      }
    }
    if [Image] {
      mutate { rename => { "Image" => "[process][executable]" } }
    }
    if [DestinationIp] {
      mutate {
        rename => { "DestinationIp" => "[destination][ip]" }
        rename => { "DestinationPort" => "[destination][port]" }
        add_field => { "[event][category]" => "network" }
      }
    }
    if [event][code] == "1" or [EventID] == 1 {
      mutate { add_field => { "[threat][technique][id]" => "T1059" } }
    }
    if [event][code] == "3" or [EventID] == 3 {
      mutate { add_field => { "[threat][technique][id]" => "T1071" } }
    }
    if [event][code] == "10" or [EventID] == 10 {
      mutate { add_field => { "[threat][technique][id]" => "T1003" } }
    }
    if [process][command_line] =~ /(?i)(mimikatz|powershell.*-enc|certutil)/ {
      mutate { add_tag => ["sigma-candidate"] }
    }
    mutate { add_field => { "[@metadata][helk_index]" => "helk-sysmon" } }
  }
}
