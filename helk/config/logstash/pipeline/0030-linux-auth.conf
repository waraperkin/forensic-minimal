# Linux auth.log — GROK safe
filter {
  if [source_type] == "linux-auth" or [lab][source] == "linux-auth" {
    mutate {
      add_tag => ["linux", "auth"]
      add_field => {
        "[event][module]" => "linux"
        "[event][dataset]" => "linux.auth"
        "[event][category]" => "authentication"
        "[ecs][version]" => "1.12.0"
      }
    }
    grok {
      match => {
        "message" => [
          "%{SYSLOGTIMESTAMP:syslog_ts} %{IPORHOST:host.name} sshd\[%{POSINT:[process][pid]}\]: Failed password for( invalid user %{USERNAME:[user][name]})? from %{IP:[source][ip]} port %{NUMBER:[source][port]} ssh2",
          "%{SYSLOGTIMESTAMP:syslog_ts} %{IPORHOST:host.name} sshd\[%{POSINT:[process][pid]}\]: authentication failure;.*rhost=%{IP:[source][ip]}",
          "%{SYSLOGTIMESTAMP:syslog_ts} %{IPORHOST:host.name} sudo: %{USERNAME:[user][name]} : TTY=%{DATA} ; USER=%{USERNAME:sudo.target_user} ; COMMAND=%{GREEDYDATA:[process][command_line]}"
        ]
      }
      tag_on_failure => ["_grokauth_parse_failure"]
    }
    if "Failed password" in [message] or "authentication failure" in [message] {
      mutate { add_field => { "[threat][technique][id]" => "T1110.001" } add_tag => ["sigma-candidate"] }
    }
    if "sudo" in [message] {
      mutate { add_field => { "[threat][technique][id]" => "T1548.003" } }
    }
    mutate { add_field => { "[@metadata][helk_index]" => "helk-linux" } }
  }
}
