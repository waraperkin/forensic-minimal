play.http.secret.key = "forensic-thehive-secret-2024-changeme-in-prod"

application.baseUrl = "http://localhost/thehive"
play.http.context = "/thehive"

# JanusGraph : Cassandra (données) + OpenSearch (index Elasticsearch-compatible)
db.janusgraph.storage {
  backend = cql
  hostname = ["cassandra"]
  cql {
    cluster-name = forensic-thp
    keyspace = thehive
  }
}

db.janusgraph.index.search {
  backend = elasticsearch
  hostname = ["opensearch-node1"]
  index-name = thehive
}

scalligraph.modules += org.thp.thehive.connector.cortex.CortexModule
scalligraph.modules += org.thp.thehive.connector.misp.MispModule

storage {
  provider = s3
  s3 {
    bucket             = "artefacts"
    endpoint           = "http://minio:9000"
    region             = "us-east-1"
    chunkSize          = 1 MB
    readTimeout        = 1 minute
    writeTimeout       = 1 minute
    usePathAccessStyle = true
    accessKey          = "forensicadmin"
    secretKey          = "F0r3ns1c_Minio_2024!"
  }
}

cortex {
  servers = [
    {
      name     = "Cortex-Forensic"
      url      = "http://cortex:9001"
      auth.type = bearer
      auth.key  = "forensic-cortex-api-key-2024-internal"
    }
  ]
  refreshDelay         = 5 minutes
  statusCheckInterval  = 1 minute
}

misp {
  servers = [
    {
      name      = "MISP-Forensic"
      url       = "http://misp"
      auth.type = key
      auth.key  = "a1b2c3d4e5f6789012345678901234567890abcd"
      purpose   = ImportAndExport
      maxAge    = 7 days
    }
  ]
  interval = 5 minutes
}

notification.webhook.endpoints = [
  {
    name    = "forensic-portal"
    url     = "http://cert-portal:3000/api/webhook/thehive"
    version = 0
    auth { type = noauth }
    includedTheHiveOrganisations = ["*"]
  }
]

play.filters.disabled += play.filters.csrf.CSRFFilter
