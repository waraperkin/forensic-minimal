# Chemins absolus émis par MISP (formulaires sans préfixe /misp/)
proxy_set_header Host               $host;
proxy_set_header X-Forwarded-Host   $host;
proxy_set_header X-Forwarded-Proto  https;
proxy_set_header X-Forwarded-Port   443;
proxy_set_header Upgrade            $http_upgrade;
proxy_set_header Connection         $conn_upgrade;
# MISP.baseurl porte l'URL canonique — éviter proxy_redirect / → /misp/ (double /misp/misp/)
proxy_redirect off;
# MISP CSRF : Referer navigateur prioritaire, repli calculé (voir forensic.conf)
proxy_set_header Referer $misp_referer_final;
proxy_read_timeout 300s;
