# Snippet proxy Grafana — inclus dans location /grafana/
proxy_http_version 1.1;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto https;
proxy_set_header X-Forwarded-Host $host;
proxy_set_header X-Forwarded-Port 443;
# Origin pour Grafana Live (WebSocket) — aligné sur l’hôte public
proxy_set_header Origin $grafana_proxy_origin;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $conn_upgrade;
proxy_read_timeout 3600s;
proxy_send_timeout 3600s;
# CORS (réponses API / assets)
add_header Access-Control-Allow-Origin $grafana_cors_origin always;
add_header Access-Control-Allow-Credentials "true" always;
add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Grafana-Org-Id, X-Requested-With" always;
