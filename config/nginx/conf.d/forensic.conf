# ── Forensic Platform v2.1 — Nginx (HTTP + HTTPS) ─────────────
upstream u_cert    { server cert-portal:3000; }
upstream u_it      { server it-portal:3001; }
upstream u_osd     { server opensearch-dashboards:5601; }
upstream u_grafana { server grafana:3000; }
upstream u_opencti { server opencti:8080; }
upstream u_thehive { server thehive:9000; }
upstream u_ts      { server timesketch-web:5000; }
upstream u_misp    { server misp:80; }
upstream u_minio_console { server minio:9001; }
upstream u_cortex  { server cortex:9001; }
upstream u_helk_kibana { server helk-kibana:5601; }
upstream u_helk_es     { server helk-elasticsearch:9200; }
upstream u_velociraptor { server velociraptor-server:8000; }
upstream u_vr_bridge  { server velociraptor-bridge:8097; }

map $http_upgrade $conn_upgrade {
  default upgrade;
  ''      close;
}

# Origines autorisées pour Grafana (Live + CORS) — IP lab + localhost
map $http_origin $grafana_cors_origin {
  default "https://10.78.0.9";
  "~^https?://(10\.78\.0\.9|localhost|127\.0\.0\.1)(:[0-9]+)?/?$" $http_origin;
  "" "https://$host";
}
map $http_origin $grafana_proxy_origin {
  default "https://10.78.0.9";
  "~^https?://(10\.78\.0\.9|localhost|127\.0\.0\.1)(:[0-9]+)?/?$" $http_origin;
  "" "https://$host";
}

# MISP CSRF — évite Referer …/misp/misp/… quand l'URI contient déjà /misp/
map $request_uri $misp_referer_fallback {
  ~^/misp  "https://$host$request_uri";
  default  "https://$host/misp$request_uri";
}
map $http_referer $misp_referer_final {
  ""      $misp_referer_fallback;
  default $http_referer;
}

# ── HTTP : redirect vers HTTPS ─────────────────────────────────
server {
  listen 80 default_server;
  server_name 10.78.0.9;

  # Health checks internes sans redirect (pour les healthchecks Docker)
  location /nginx-health { return 200 "OK\n"; }

  # Tout le reste → HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

# ── HTTPS : services complets ──────────────────────────────────
server {
  listen 443 ssl default_server;
  server_name 10.78.0.9;

  ssl_certificate     /etc/nginx/certs/server/server.crt;
  ssl_certificate_key /etc/nginx/certs/server/server.key;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
  ssl_prefer_server_ciphers on;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;
  add_header          Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  client_max_body_size    5G;
  proxy_read_timeout      3600s;
  proxy_send_timeout      3600s;
  proxy_connect_timeout   120s;
  proxy_http_version      1.1;
  proxy_buffering         off;
  proxy_request_buffering off;

  proxy_set_header Host               $host;
  proxy_set_header X-Real-IP          $remote_addr;
  proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto  https;

  location /nginx-health { return 200 "OK\n"; add_header Content-Type text/plain; }

  # ── Portail IT /it/ (upload chiffré TLS) ──────────────────
  location /it/ {
    proxy_pass http://u_it/;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $conn_upgrade;
    proxy_read_timeout 7200s;
    proxy_send_timeout 7200s;
  }
  location = /it { return 301 /it/; }

  # ── Timesketch (proxy sous-chemin) ────────────────────────
  # Le SPA Vue appelle /api/v1 et /sketch/* en chemins absolus (sans /timesketch/)
  location /api/v1/ {
    proxy_pass http://u_ts/api/v1/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $conn_upgrade;
    proxy_set_header Host               $host;
    proxy_set_header X-Forwarded-Proto  https;
    proxy_set_header X-Forwarded-Prefix /timesketch;
    proxy_read_timeout 3600s;
  }
  location /sketch/ {
    proxy_pass http://u_ts/sketch/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $conn_upgrade;
    proxy_set_header Host               $host;
    proxy_set_header X-Forwarded-Proto  https;
    proxy_set_header X-Forwarded-Prefix /timesketch;
    proxy_read_timeout 3600s;
  }
  location /logout/ {
    proxy_pass http://u_ts/logout/;
    proxy_http_version 1.1;
    proxy_set_header Host               $host;
    proxy_set_header X-Forwarded-Proto  https;
    proxy_read_timeout 120s;
  }
  # Timesketch — login POST en chemin absolu /login/ (hors /timesketch/)
  location /login/ {
    proxy_pass http://u_ts/login/;
    proxy_http_version 1.1;
    proxy_set_header Host               $host;
    proxy_set_header X-Forwarded-Proto  https;
    proxy_set_header X-Forwarded-Prefix /timesketch;
    proxy_redirect /sketch/ https://$host/sketch/;
    proxy_redirect / https://$host/timesketch/;
    proxy_read_timeout 120s;
  }
  location = /login {
    return 301 /login/;
  }
  # La console référence /dist/* en chemins absolus — proxy dédié
  location /dist/ {
    proxy_pass http://u_ts/dist/;
    proxy_set_header Host               $host;
    proxy_set_header X-Forwarded-Proto  https;
    proxy_read_timeout 3600s;
  }
  location /timesketch/ {
    proxy_pass http://u_ts/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $conn_upgrade;
    proxy_set_header Host               $host;
    proxy_set_header X-Forwarded-Proto  https;
    proxy_set_header X-Forwarded-Prefix /timesketch;
    proxy_read_timeout 3600s;
    proxy_set_header Accept-Encoding "";
    sub_filter_once off;
    sub_filter_types text/html application/javascript text/javascript;
    sub_filter '<head>' '<head><base href="/timesketch/">';
    sub_filter 'src="/dist/' 'src="/timesketch/dist/';
    sub_filter 'href="/dist/' 'href="/timesketch/dist/';
    sub_filter 'baseURL:"/api/v1"' 'baseURL:"/timesketch/api/v1"';
    sub_filter "baseURL:'/api/v1'" "baseURL:'/timesketch/api/v1'";
  }
  location /timesketch/api/v1/ {
    proxy_pass http://u_ts/api/v1/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $conn_upgrade;
    proxy_set_header Host               $host;
    proxy_set_header X-Forwarded-Proto  https;
    proxy_set_header X-Forwarded-Prefix /timesketch;
    proxy_read_timeout 3600s;
  }
  location = /timesketch { return 301 /timesketch/; }

  # ── OpenSearch Dashboards (SERVER_BASEPATH=/dashboards) ───
  location /dashboards {
    proxy_pass http://u_osd;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $conn_upgrade;
  }
  location = /dashboards { return 301 /dashboards/; }

  # ── Grafana (sous-chemin /grafana/) ───────────────────────
  location /grafana/ {
    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin $grafana_cors_origin always;
      add_header Access-Control-Allow-Credentials "true" always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Grafana-Org-Id, X-Requested-With" always;
      return 204;
    }
    include /etc/nginx/snippets/grafana-proxy.conf;
    proxy_pass http://u_grafana;
  }
  location /grafana {
    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin $grafana_cors_origin always;
      add_header Access-Control-Allow-Credentials "true" always;
      return 204;
    }
    include /etc/nginx/snippets/grafana-proxy.conf;
    proxy_pass http://u_grafana;
  }
  location = /grafana { return 301 /grafana/; }

  # ── OpenCTI ───────────────────────────────────────────────
  location /cti/ {
    proxy_pass http://u_opencti;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $conn_upgrade;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_connect_timeout 180s;
    proxy_read_timeout 900s;
    proxy_send_timeout 900s;
    proxy_next_upstream error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 3;
    proxy_next_upstream_timeout 120s;
  }
  location = /cti { return 301 /cti/; }

  # ── TheHive ───────────────────────────────────────────────
  location /thehive/ {
    proxy_pass http://u_thehive/thehive/;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $conn_upgrade;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_read_timeout 300s;
  }
  location = /thehive { return 301 /thehive/; }

  # CERT shell CSS — priorité sur le proxy MISP des chemins absolus /css/*
  location = /css/cert-shell.css {
    proxy_pass http://u_cert;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  # GET /users/login → /misp/users/login (login AJAX MISP derrière sous-chemin)
  location = /users/login {
    if ($request_method = GET) {
      return 302 /misp/users/login$is_args$args;
    }
    include /etc/nginx/snippets/misp-root-paths.conf;
    proxy_pass http://u_misp/users/login;
  }

  # ── MISP chemins absolus (login POST /users/login sans préfixe) ──
  location ~ ^/(users|events|attributes|servers|organisations|admin|img|css|js|fonts|favicon\.ico)(/|$) {
    include /etc/nginx/snippets/misp-root-paths.conf;
    proxy_pass http://u_misp$request_uri;
  }

  # ── MISP (sous-chemin ; MISP_PUBLIC_BASE_URL=https://$host/misp/) ──
  location /misp/ {
    include /etc/nginx/snippets/misp-root-paths.conf;
    proxy_pass http://u_misp/;
    proxy_set_header Accept-Encoding "";
    sub_filter_once off;
    sub_filter_types text/html;
    # Login AJAX (fetchFormDataAjax) doit poster sous /misp/, pas /users/login à la racine
    sub_filter 'action="/users/login"' 'action="/misp/users/login"';
    sub_filter "action='/users/login'" "action='/misp/users/login'";
    sub_filter "window.location = baseurl + '/users/login'" "window.location = baseurl + '/events/index'";
  }
  location = /misp { return 301 /misp/; }

  # ── MinIO Console (sous-chemin ; MINIO_BROWSER_REDIRECT_URL=/minio/) ──
  location /minio/ {
    rewrite ^/minio/(.*)$ /$1 break;
    proxy_pass http://u_minio_console;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $conn_upgrade;
    proxy_set_header Host               $host;
    proxy_set_header X-Forwarded-Proto  https;
    proxy_set_header X-Forwarded-Prefix /minio;
    proxy_redirect off;
    proxy_read_timeout 300s;
    sub_filter_once off;
    sub_filter_types application/javascript;
    sub_filter '<base href="/"/>' '<base href="/minio/">';
  }
  location = /minio { return 301 /minio/; }

  # ── Cortex ──────────────────────────────────────────────
  location /cortex/ {
    proxy_pass http://u_cortex/;
    proxy_redirect /index.html /cortex/index.html;
    proxy_redirect ~^/(.*)$ /cortex/$1;
    proxy_cookie_path / /cortex/;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $conn_upgrade;
    proxy_set_header Host               $host;
    proxy_read_timeout 300s;
  }
  location = /cortex { return 301 /cortex/; }

  # ── HELK sidecar (Kibana + Elasticsearch API) ────────────────
  location /helk/kibana/ {
    proxy_pass http://u_helk_kibana/helk/kibana/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $conn_upgrade;
  }
  location = /helk/kibana { return 301 /helk/kibana/; }

  location /helk/api/ {
    rewrite ^/helk/api/(.*)$ /$1 break;
    proxy_pass http://u_helk_es;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
  location = /helk/api { return 301 /helk/api/; }

  # ── Velociraptor bridge (AVANT proxy GUI /velociraptor/) ──
  location = /velociraptor/api/health {
    rewrite ^/velociraptor/api/(.*)$ /$1 break;
    proxy_pass http://u_vr_bridge;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
  location = /velociraptor/api/clients {
    rewrite ^/velociraptor/api/(.*)$ /$1 break;
    proxy_pass http://u_vr_bridge;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
  location /velociraptor/api/export/ {
    rewrite ^/velociraptor/api/(.*)$ /$1 break;
    proxy_pass http://u_vr_bridge;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 3600s;
  }
  location /velociraptor/api/lab/ {
    rewrite ^/velociraptor/api/(.*)$ /$1 break;
    proxy_pass http://u_vr_bridge;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 3600s;
  }
  location = /velociraptor/api/collect {
    rewrite ^/velociraptor/api/(.*)$ /$1 break;
    proxy_pass http://u_vr_bridge;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 3600s;
  }
  location = /velociraptor/api { return 301 /velociraptor/api/health; }

  # ── Velociraptor GUI (base_path /velociraptor) ──
  location /velociraptor/ {
    proxy_pass https://u_velociraptor/velociraptor/;
    proxy_ssl_verify off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Prefix /velociraptor;
    proxy_set_header Referer $http_referer;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $conn_upgrade;
    proxy_read_timeout 3600s;
    proxy_request_buffering off;
    proxy_buffering off;
  }
  location = /velociraptor { return 301 /velociraptor/; }

  location /opensearch/ {
    return 301 /dashboards/;
  }
  location = /opensearch { return 301 /opensearch/; }

  # Alias historique /cert/ → portail racine
  location = /cert { return 301 /; }
  location = /cert/ { return 301 /; }

  # ── Portail CERT (racine) ─────────────────────────────────
  location / {
    proxy_pass http://u_cert;
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  https;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $conn_upgrade;
  }
}
