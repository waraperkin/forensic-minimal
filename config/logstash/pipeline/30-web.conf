filter {
  if "web" in [tags] or "hec" in [tags] or [@metadata][pipeline] == "web" {
    mutate { add_field => { "[event][category]" => "web" "[event][module]" => "web" } }

    if [log][file][path] =~ /(apache|nginx|httpd)/ or [fileset][name] == "access" {
      grok {
        match => { "message" => "%{COMBINEDAPACHELOG}" }
        tag_on_failure => ["_grok_web_failure"]
      }
      if !("_grok_web_failure" in [tags]) {
        mutate {
          rename => { "clientip" => "[source][ip]" "verb" => "[http][request][method]"
                      "request"  => "[url][path]"  "response" => "[http][response][status_code]"
                      "bytes"    => "[http][response][bytes]" "agent" => "[user_agent][original]" }
        }
        date { match => ["timestamp", "dd/MMM/yyyy:HH:mm:ss Z"] remove_field => ["timestamp"] }
      }
    }

    else if [log][file][path] =~ /iis/ {
      grok {
        patterns_dir => ["/usr/share/logstash/patterns"]
        match => { "message" => "%{IISDATE} %{IISTIME} %{IPORHOST:[destination][ip]} %{URIPATH:[url][path]} %{NOTSPACE:[url][query]} %{POSINT:[destination][port]} %{NOTSPACE:[user][name]} %{IPORHOST:[source][ip]} %{NOTSPACE:[user_agent][original]} %{NOTSPACE} %{POSINT:[http][response][status_code]}" }
        tag_on_failure => ["_grok_iis_failure"]
      }
    }

    if [user_agent][original] {
      useragent { source => "[user_agent][original]" target => "[user_agent]" }
    }

    if [source][ip] and [source][ip] !~ /^(10\.|172\.(1[6-9]|2[0-9]|3[0-1])\.|192\.168\.|127\.)/ {
      geoip { source => "[source][ip]" target => "[source][geo]" }
    }

    if [url][path] {
      ruby {
        code => '
          url = event.get("[url][path]") || ""
          alerts = []
          alerts << "sqli"          if url =~ /(?i)(union.*select|drop.*table|1=1|or.*=.*--)/
          alerts << "path_traversal" if url =~ /(\.\.[\/\\]){2,}/
          alerts << "lfi"           if url =~ /(?i)(\/etc\/passwd|\/etc\/shadow|boot\.ini)/
          alerts << "xss"           if url =~ /(?i)(<script|javascript:|onerror=|alert\()/
          alerts << "scanner"       if url =~ /(?i)(\.env|\.git|phpinfo|wp-config)/
          unless alerts.empty?
            event.set("tags", (event.get("tags") || []) + ["ALERT"] + alerts)
            event.set("[threat][technique][id]", "T1190")
          end
        '
      }
    }
    mutate { remove_field => ["@version"] }
  }
}

output {
  if "web" in [tags] or "hec" in [tags] or [@metadata][pipeline] == "web" {
    opensearch { hosts => ["http://${OPENSEARCH_HOST}"] index => "forensic-web-%{+YYYY.MM.dd}" }
  }
}
