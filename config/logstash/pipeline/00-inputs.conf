# Un seul bloc d'entrées : plusieurs fichiers .conf sont fusionnés en un pipeline ;
# des beats/tcp sur les mêmes ports provoquaient des erreurs Netty / ports déjà pris.
input {
  beats { port => 5044 }
  tcp {
    port  => 5045
    codec => json_lines
    tags  => ["json"]
    add_field => { "[@metadata][pipeline]" => "json" }
  }
  udp  { port => 5140 codec => plain tags => ["syslog"] }
  tcp  { port => 5046 codec => plain tags => ["syslog"] }
  gelf { port => 12201 tags => ["docker"] }
  http { port => 5555 codec => json tags => ["hec"] }
}
