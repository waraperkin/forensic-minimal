# Pipeline 50 — Indexation du contenu des fichiers uploadés
# Reçoit les lignes parsées depuis portal-cert (via port 5045, tag file-content)
# IMPORTANT: si l'événement est routé ici (tag file-content), on retire le tag "json"
# pour qu'il ne soit pas dupliqué par le pipeline 40-multi-source.
filter {
  if "file-content" in [tags] {
    # Tag exclusif : évite la double indexation par 40-multi-source.conf
    mutate { remove_tag => ["json"] }

    if [csv_datetime] and [csv_datetime] != "" {
      date { match => ["csv_datetime","ISO8601","yyyy-MM-dd HH:mm:ss","yyyy-MM-dd'T'HH:mm:ss"] target => "@timestamp" tag_on_failure => [] }
    }
    if [csv_timestamp] and [csv_timestamp] != "" {
      date { match => ["csv_timestamp","ISO8601","UNIX","UNIX_MS"] target => "@timestamp" tag_on_failure => [] }
    }

    if [source_ip] { mutate { rename => { "source_ip" => "[source][ip]" } } }
    if [dest_ip]   { mutate { rename => { "dest_ip"   => "[destination][ip]" } } }
    if [log_level] { mutate { rename => { "log_level" => "[log][level]" } } }

    if ![event][module]   { mutate { add_field => { "[event][module]" => "file-upload" } } }
    if ![event][category] { mutate { add_field => { "[event][category]" => "file" } } }

    mutate { remove_field => ["@version"] }
  }
}

output {
  if "file-content" in [tags] {
    if [os_type] == "windows" or [source_file] =~ /(?i)(windows|security|evtx|winevt)/ {
      opensearch { hosts => ["http://${OPENSEARCH_HOST}"] index => "forensic-windows-%{+YYYY.MM.dd}" }
    }
    else if [os_type] == "linux" or [source_file] =~ /(?i)(linux|syslog|auth\.log|kern|messages)/ {
      opensearch { hosts => ["http://${OPENSEARCH_HOST}"] index => "forensic-linux-%{+YYYY.MM.dd}" }
    }
    else if [os_type] =~ /cloud|aws|azure|gcp/ or [source_file] =~ /(?i)(cloudtrail|azure|gcp)/ {
      opensearch { hosts => ["http://${OPENSEARCH_HOST}"] index => "forensic-cloud-%{+YYYY.MM.dd}" }
    }
    else if [source_file] =~ /(?i)(apache|nginx|iis|access\.log|error\.log)/ {
      opensearch { hosts => ["http://${OPENSEARCH_HOST}"] index => "forensic-web-%{+YYYY.MM.dd}" }
    }
    else if [source_file] =~ /(?i)(zeek|bro|suricata|pcap|network)/ {
      opensearch { hosts => ["http://${OPENSEARCH_HOST}"] index => "forensic-network-%{+YYYY.MM.dd}" }
    }
    else {
      opensearch { hosts => ["http://${OPENSEARCH_HOST}"] index => "forensic-endpoint-%{+YYYY.MM.dd}" }
    }
  }
}
