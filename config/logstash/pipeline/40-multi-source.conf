filter {
  if "json" in [tags] or [@metadata][pipeline] in ["multi", "json"] {

    # AWS CloudTrail
    if [eventSource] =~ /amazonaws\.com/ or [source] == "aws.cloudtrail" {
      mutate {
        rename => { "eventTime"       => "@timestamp" "eventName"    => "[event][action]"
                    "eventSource"     => "[cloud][service][name]"
                    "awsRegion"       => "[cloud][region]"
                    "sourceIPAddress" => "[source][ip]"
                    "[userIdentity][arn]" => "[user][name]" }
        add_field => { "[event][module]" => "cloudtrail" "[cloud][provider]" => "aws" "[event][category]" => "cloud" }
      }
      if [event][action] =~ /(?i)(CreateUser|AttachUserPolicy|CreateAccessKey)/ {
        mutate { add_tag => ["ALERT","iam_escalation"] add_field => { "[threat][technique][id]" => "T1136.003" } }
      }
    }

    # Azure
    else if [source] == "azure.activitylogs" or [category] == "Administrative" {
      mutate {
        rename => { "operationName" => "[event][action]" "callerIpAddress" => "[source][ip]" "caller" => "[user][name]" }
        add_field => { "[event][module]" => "azure" "[cloud][provider]" => "azure" "[event][category]" => "cloud" }
      }
    }

    # GCP
    else if [logName] =~ /cloudaudit\.googleapis/ {
      mutate {
        rename => { "[protoPayload][methodName]" => "[event][action]"
                    "[protoPayload][authenticationInfo][principalEmail]" => "[user][name]"
                    "[protoPayload][requestMetadata][callerIp]" => "[source][ip]" }
        add_field => { "[event][module]" => "gcp_audit" "[cloud][provider]" => "gcp" "[event][category]" => "cloud" }
      }
    }

    # K8s Audit
    else if [objectRef][resource] or [source] == "k8s.audit" {
      mutate {
        rename => { "verb" => "[event][action]" "[user][username]" => "[user][name]"
                    "[objectRef][resource]"  => "[kubernetes][resource]"
                    "[objectRef][namespace]" => "[kubernetes][namespace]" }
        add_field => { "[event][module]" => "k8s_audit" "[event][category]" => "container" }
      }
      if [kubernetes][resource] == "secrets" and [event][action] in ["get","list","watch"] {
        mutate { add_tag => ["ALERT","k8s_secret_access"] add_field => { "[threat][technique][id]" => "T1552.007" } }
      }
    }

    # KAPE
    else if [source] == "kape" or [tool] == "kape" {
      mutate { add_field => { "[event][module]" => "kape" "[event][category]" => "host" } }
    }

    # Velociraptor
    else if [ClientId] or [source] == "velociraptor" {
      mutate {
        rename => { "ClientId" => "[agent][id]" "Fqdn" => "[host][name]" "Artifact" => "[event][dataset]" }
        add_field => { "[event][module]" => "velociraptor" "[event][category]" => "host" }
      }
    }

    # Plaso
    else if [parser] or [source] == "plaso" {
      mutate {
        rename => { "parser" => "[event][module]" "hostname" => "[host][name]" "username" => "[user][name]" }
        add_field => { "[event][category]" => "host" "[event][action]" => "plaso-entry" }
      }
    }

    # Zeek
    else if [_path] {
      mutate { add_field => { "[event][module]" => "zeek" } }
      if [_path] == "conn" {
        mutate {
          rename => { "id.orig_h" => "[source][ip]" "id.orig_p" => "[source][port]"
                      "id.resp_h" => "[destination][ip]" "id.resp_p" => "[destination][port]"
                      "proto"     => "[network][transport]" }
          add_field => { "[event][category]" => "network" }
        }
      }
    }

    # Suricata
    else if [event_type] == "alert" and [src_ip] {
      mutate {
        rename => { "src_ip" => "[source][ip]" "src_port" => "[source][port]"
                    "dest_ip" => "[destination][ip]" "dest_port" => "[destination][port]"
                    "[alert][signature]" => "[rule][name]" }
        add_field => { "[event][module]" => "suricata" "[event][category]" => "intrusion_detection" }
      }
    }

    # MySQL
    else if [event][module] == "mysql" or [log][file][path] =~ /mysql/ {
      mutate { add_field => { "[event][module]" => "mysql" "[event][category]" => "database" } }
    }

    # PostgreSQL
    else if [event][module] == "postgresql" {
      mutate { add_field => { "[event][category]" => "database" } }
    }

    # Firewall generic
    else if [event][module] == "firewall" or [log][file][path] =~ /pfsense|filterlog/ {
      mutate { add_field => { "[event][module]" => "firewall" "[event][category]" => "network" } }
    }

    mutate { remove_field => ["@version"] }
  }
}

output {
  if "json" in [tags] or [@metadata][pipeline] in ["multi", "json"] {
    if [cloud][provider] {
      opensearch { hosts => ["http://${OPENSEARCH_HOST}"] index => "forensic-cloud-%{+YYYY.MM.dd}" }
    } else if [event][module] == "k8s_audit" {
      opensearch { hosts => ["http://${OPENSEARCH_HOST}"] index => "forensic-k8s-%{+YYYY.MM.dd}" }
    } else if [event][category] == "database" {
      opensearch { hosts => ["http://${OPENSEARCH_HOST}"] index => "forensic-db-%{+YYYY.MM.dd}" }
    } else if [event][module] in ["kape","velociraptor","plaso"] {
      opensearch { hosts => ["http://${OPENSEARCH_HOST}"] index => "forensic-endpoint-%{+YYYY.MM.dd}" }
    } else if [event][module] in ["zeek","suricata"] {
      opensearch { hosts => ["http://${OPENSEARCH_HOST}"] index => "forensic-network-%{+YYYY.MM.dd}" }
    } else if [event][module] == "firewall" {
      opensearch { hosts => ["http://${OPENSEARCH_HOST}"] index => "forensic-firewall-%{+YYYY.MM.dd}" }
    } else {
      opensearch { hosts => ["http://${OPENSEARCH_HOST}"] index => "forensic-uploads-%{+YYYY.MM.dd}" }
    }
  }
}
