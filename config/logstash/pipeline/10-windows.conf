filter {
  if "windows" in [tags] or [@metadata][pipeline] == "windows" or [winlog][event_id] {

    mutate { add_field => { "[host][os][family]" => "windows" "[event][module]" => "winlog" } }

    if [winlog][computer_name] { mutate { rename => { "[winlog][computer_name]" => "[host][name]" } } }
    if [winlog][event_id]      { mutate { rename => { "[winlog][event_id]"      => "[event][code]" } } }
    if [winlog][time_created]  { date { match => ["[winlog][time_created]", "ISO8601"] } }

    # Sysmon 1 — Process Create
    if [event][code] == "1" {
      mutate {
        add_field => { "[event][category]" => "process" "[event][type]" => "start" }
        rename => { "[winlog][event_data][Image]"       => "[process][executable]" }
        rename => { "[winlog][event_data][CommandLine]" => "[process][command_line]" }
        rename => { "[winlog][event_data][ProcessId]"   => "[process][pid]" }
        rename => { "[winlog][event_data][User]"        => "[user][name]" }
      }
      if [process][command_line] =~ /(?i)(-enc|-encodedcommand)/ {
        mutate { add_tag => ["ALERT","encoded_powershell"] add_field => { "[threat][technique][id]" => "T1059.001" } }
      }
      if [process][command_line] =~ /(?i)(mimikatz|sekurlsa|lsass)/ {
        mutate { add_tag => ["ALERT","credential_dumping"] add_field => { "[threat][technique][id]" => "T1003.001" } }
      }
    }
    else if [event][code] == "3" {
      mutate {
        add_field => { "[event][category]" => "network" "[event][type]" => "connection" }
        rename => { "[winlog][event_data][SourceIp]"        => "[source][ip]" }
        rename => { "[winlog][event_data][SourcePort]"      => "[source][port]" }
        rename => { "[winlog][event_data][DestinationIp]"   => "[destination][ip]" }
        rename => { "[winlog][event_data][DestinationPort]" => "[destination][port]" }
      }
    }
    else if [event][code] == "11" {
      mutate { add_field => { "[event][category]" => "file" "[event][type]" => "creation" }
              rename => { "[winlog][event_data][TargetFilename]" => "[file][path]" } }
    }
    else if [event][code] == "4624" {
      mutate {
        add_field => { "[event][category]" => "authentication" "[event][outcome]" => "success" }
        rename => { "[winlog][event_data][TargetUserName]" => "[user][name]" }
        rename => { "[winlog][event_data][IpAddress]"      => "[source][ip]" }
      }
    }
    else if [event][code] == "4625" {
      mutate {
        add_field => { "[event][category]" => "authentication" "[event][outcome]" => "failure" }
        rename => { "[winlog][event_data][TargetUserName]" => "[user][name]" }
        rename => { "[winlog][event_data][IpAddress]"      => "[source][ip]" }
      }
      mutate { add_tag => ["failed_logon"] }
    }
    else if [event][code] == "4688" {
      mutate {
        add_field => { "[event][category]" => "process" "[event][type]" => "start" }
        rename => { "[winlog][event_data][NewProcessName]" => "[process][executable]" }
        rename => { "[winlog][event_data][CommandLine]"    => "[process][command_line]" }
        rename => { "[winlog][event_data][SubjectUserName]"=> "[user][name]" }
      }
    }
    else if [event][code] == "4698" {
      mutate { add_field => { "[event][category]" => "configuration" }
              add_tag => ["ALERT","scheduled_task"]
              add_field => { "[threat][technique][id]" => "T1053.005" } }
    }
    else if [event][code] == "7045" {
      mutate { add_tag => ["ALERT","new_service"] add_field => { "[threat][technique][id]" => "T1543.003" } }
    }

    mutate { remove_field => ["@version"] }
  }
}

output {
  if "windows" in [tags] or [host][os][family] == "windows" or [event][module] == "winlog" {
    opensearch {
      hosts       => ["http://${OPENSEARCH_HOST}"]
      index       => "forensic-windows-%{+YYYY.MM.dd}"
    }
  }
}
