# ── Playbooks — format [Action] — [Object] — [Context] ──
playbook_title_patterns:
  - match: "IOC → OpenCTI"
    replace: "Enrich — IOC — OpenCTI"
  - match: "IOC → MISP"
    replace: "Enrich — Domain — MISP"
  - match: "Timeline"
    replace: "Analyze — Timeline — Timesketch"
  - match: "Sigma"
    replace: "Detect — Sigma — Windows Logon"
  - match: "Replay"
    replace: "Replay — Attack — Purple Team"
  - match: "Alert"
    replace: "Respond — Alert — SOC"
  - match: "Case"
    replace: "Investigate — Incident — Endpoint"
  - match: "CERT"
    replace: "Notify — CERT — Escalation"
  - match: "Report"
    replace: "Report — Incident — CERT-FR Format"

