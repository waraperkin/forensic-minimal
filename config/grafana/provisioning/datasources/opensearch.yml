apiVersion: 1

datasources:
  - name: OpenSearch-Uploads
    type: grafana-opensearch-datasource
    uid: forensic-uploads
    access: proxy
    url: http://opensearch-node1:9200
    isDefault: false
    jsonData:
      database: "forensic-uploads*"
      timeField: "@timestamp"
      version: "2.12.0"
      flavor: OpenSearch
      pplEnabled: false
      maxConcurrentShardRequests: 5

  - name: OpenSearch-Forensic
    type: grafana-opensearch-datasource
    uid: forensic-main
    access: proxy
    url: http://opensearch-node1:9200
    isDefault: false
    jsonData:
      # Métadonnées portail / événements applicatifs (exclut logs bruts massifs)
      database: "forensic-uploads*"
      timeField: "@timestamp"
      version: "2.12.0"
      flavor: OpenSearch
      pplEnabled: false
      maxConcurrentShardRequests: 5
      logMessageField: message
      logLevelField: log.level

  - name: OpenSearch-All-Events
    type: grafana-opensearch-datasource
    uid: forensic-all
    access: proxy
    url: http://opensearch-node1:9200
