# Forensic Platform — Grafana (sous-chemin /grafana/ derrière Nginx)
# Les variables GF_* dans docker-compose priment sur ce fichier si définies.

[server]
# HTTP vers le conteneur (Nginx termine le TLS) ; root_url = URL publique HTTPS
protocol = http
domain = 10.78.0.9
root_url = https://10.78.0.9/grafana/
serve_from_sub_path = true
enforce_domain = false

[security]
allow_embedding = true
cookie_secure = true
cookie_samesite = none
csrf_trusted_origins = https://10.78.0.9,http://10.78.0.9,https://localhost,http://localhost,https://127.0.0.1,http://127.0.0.1

[live]
allowed_origins = https://10.78.0.9,http://10.78.0.9,https://localhost,http://localhost,https://127.0.0.1,http://127.0.0.1

[cors]
enabled = true
allow_credentials = true
allow_origin = https://10.78.0.9,http://10.78.0.9,https://localhost,http://localhost

[users]
allow_sign_up = false

[auth.anonymous]
enabled = true
org_role = Admin
