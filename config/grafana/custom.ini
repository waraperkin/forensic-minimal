[server]
root_url = https://localhost/grafana/
serve_from_sub_path = true
domain = localhost

[security]
admin_user = admin
allow_embedding = true
cookie_samesite = lax
csrf_trusted_origins = https://localhost,http://localhost,https://127.0.0.1,http://127.0.0.1

[live]
allowed_origins = https://localhost,http://localhost,https://127.0.0.1,http://127.0.0.1,http://localhost:3001

[users]
allow_sign_up = false

[auth.anonymous]
enabled = false
