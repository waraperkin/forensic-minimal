# Attentes panels / pages — mode pessimiste (doute = FAIL)
meta:
  pessimistic: true
  human_validation_required: true
  min_dom_nodes: 200
  min_body_text: 300
  forbid_phrases:
    - "server error"
    - "could not locate field"
    - "request failed"
    - "internal error"
    - "panel error"
    - "application error"

targets:
  osd.security_events:
    min_panels: 6
    min_panel_with_content: 4
    min_body_text: 1500
    js_profile: osd

  osd.ti_overview:
    min_panels: 5
    min_panel_with_content: 3
    min_body_text: 600
    js_profile: osd

  osd.incident_commander:
    min_panels: 4
    min_panel_with_content: 2
    min_body_text: 1200
    js_profile: osd

  osd.purple_team:
    min_panels: 4
    min_panel_with_content: 2
    min_body_text: 1200
    js_profile: osd

  osd.platform_health:
    min_panels: 4
    min_panel_with_content: 2
    min_body_text: 1200
    js_profile: osd

  grafana.platform_health:
